---
layout: default
---
<section class="contents-list">
    <ul aria-label="contents-list">
        {% assign current_category = page.category %}
        {% for post in site.posts %}
            {% if post.categories contains current_category %}
            <li>
                <a href="{{ post.url | relative_url }}">[{{ post.title }}]</a>
            </li>
            {% endif %}
        {% endfor %}
    </ul>
</section>
